name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Witchgrid pins Hemlock by version because the runtime gets fixes that
# matter to us. Each bump should note the load-bearing fix:
#   2.2.1 — HTTP POST body fix; without it, agent ↔ CP proxy calls
#           send empty bodies.
#   2.2.3 — socket.bind/TcpStream now throw catchable exceptions in
#           compiled binaries (#557, #559) — the agent's port_check
#           probe relies on this. Plus @stdlib/fs.make_dirs (#562) for
#           canonical-dir creation, and null-narrowing through ?. (#563)
#           which the placement code uses.
#   2.3.0 — string concat fixes: f64 → string preserves decimals,
#           integer 0 no longer dropped in concat in compiled binaries,
#           inline arithmetic in concat stringifies correctly. The
#           dashboard sparkline coords + per-GPU bar width % depend on
#           f64 string precision; pre-2.3 they truncated to integer.
#   2.3.1 — @stdlib/http.download_streaming() for bounded-memory peer
#           pulls of large GGUFs (agent/transfers.hml). Pre-2.3.1 had
#           to buffer the entire response via get_binary; would pinch
#           on 40 GB+ models. Also fixes @stdlib/http.download() which
#           silently wrote 0 bytes in compiled binaries. v0.4 routing
#           proxy will use stream() / read_binary() for SSE passthrough.
env:
  HEMLOCK_VERSION: 2.3.1

jobs:
  build:
    name: build cp + agent + inspect
    runs-on: ubuntu-latest
    permissions:
      # Needed only for the tag-triggered release upload step below;
      # main-branch + PR runs don't exercise it.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Hemlock runtime deps
        # The compiled witchgrid binaries dlopen libffi/libssl/libwebsockets/
        # libz at startup. Use -dev packages so we don't have to chase the
        # libwebsockets soname on whatever Ubuntu image GitHub is running
        # this week.
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev libssl-dev libwebsockets-dev zlib1g-dev

      - name: Install Hemlock ${{ env.HEMLOCK_VERSION }}
        run: |
          # NOTE: install to /usr/local rather than ~/.local — install.sh
          # puts stdlib at ${PREFIX}/lib/hemlock/stdlib, but hemlockc only
          # searches <exe-dir>/{stdlib,../stdlib}, cwd, and the hardcoded
          # /usr/local/lib/hemlock/stdlib. With --prefix ~/.local none of
          # those match and every @stdlib/* import errors out as
          # "stdlib directory not found". /usr/local is the path that works
          # without symlinks. (Filed upstream — when hemlockc gains a
          # <exe-dir>/../lib/hemlock/stdlib search, switch back to ~/.local.)
          curl -fsSL https://raw.githubusercontent.com/hemlang/hemlock/main/install.sh \
            | sudo bash -s -- --version "v${HEMLOCK_VERSION}" \
                              --prefix "/usr/local" \
                              --no-modify-path

      - name: Verify Hemlock version
        run: |
          hemlock --version
          hemlockc --version
          # Fail fast if install grabbed the wrong version (e.g. install.sh
          # silently fell back to "latest").
          hemlockc --version | grep -q "${HEMLOCK_VERSION}" \
            || { echo "Wrong Hemlock version installed"; exit 1; }

      - name: Build cp
        run: |
          cd cp
          hemlockc cp.hml -o witchgrid-cp
          file witchgrid-cp
          ls -la witchgrid-cp

      - name: Build agent
        run: |
          cd agent
          hemlockc agent.hml -o witchgrid-agent
          file witchgrid-agent
          ls -la witchgrid-agent

      - name: Build inspect
        run: |
          cd cp
          hemlockc inspect.hml -o witchgrid-inspect
          file witchgrid-inspect
          ls -la witchgrid-inspect

      - name: Unit tests
        # Pure-function coverage for intent translator + capabilities
        # parser. Runs the same `hemlock tests/run.hml` an operator runs
        # locally; exits non-zero if any test fails. See tests/README.md
        # for the test layout.
        run: hemlock tests/run.hml

      - name: Smoke test — CP starts and answers /healthz
        run: |
          ./cp/witchgrid-cp > /tmp/cp.log 2>&1 &
          CP_PID=$!
          # Poll, don't sleep blindly. Fail loud if it doesn't come up.
          for i in 1 2 3 4 5; do
            if curl -fsS http://localhost:8765/healthz 2>/dev/null; then
              echo
              echo "CP healthy"
              kill $CP_PID
              exit 0
            fi
            sleep 1
          done
          echo "CP didn't answer /healthz; log was:"
          cat /tmp/cp.log
          kill $CP_PID 2>/dev/null
          exit 1

      # No agent smoke test yet — agent's main() does a synchronous POST
      # /register to CP at boot, so booting it without a CP would block
      # until the HTTP timeout. When heartbeats land we can boot agent +
      # CP together and round-trip /nodes here.

      # ── release artifacts ─────────────────────────────────────────
      # Only on tag pushes (v*). Bundles all three binaries plus a
      # SHA256SUMS so operators can verify their downloads, attaches
      # them to the GitHub release for the tag.
      - name: Bundle release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp cp/witchgrid-cp release/
          cp agent/witchgrid-agent release/
          cp cp/witchgrid-inspect release/
          cd release
          sha256sum * > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Create / update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        # action-gh-release@v2 reads the tag from the ref, finds (or
        # creates) the matching release, attaches files. generate_release_notes
        # builds a notes blob from commits since the previous tag, which
        # the operator can edit afterwards.
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/witchgrid-cp
            release/witchgrid-agent
            release/witchgrid-inspect
            release/SHA256SUMS
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true

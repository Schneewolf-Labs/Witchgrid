name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Witchgrid pins Hemlock by version because the runtime gets fixes that
# matter to us. Each bump should note the load-bearing fix:
#   2.2.1 — HTTP POST body fix; without it, agent ↔ CP proxy calls
#           send empty bodies.
#   2.2.3 — socket.bind/TcpStream now throw catchable exceptions in
#           compiled binaries (#557, #559) — the agent's port_check
#           probe relies on this. Plus @stdlib/fs.make_dirs (#562) for
#           canonical-dir creation, and null-narrowing through ?. (#563)
#           which the placement code uses.
#   2.3.0 — string concat fixes: f64 → string preserves decimals,
#           integer 0 no longer dropped in concat in compiled binaries,
#           inline arithmetic in concat stringifies correctly. The
#           dashboard sparkline coords + per-GPU bar width % depend on
#           f64 string precision; pre-2.3 they truncated to integer.
#   2.3.1 — @stdlib/http.download_streaming() for bounded-memory peer
#           pulls of large GGUFs (agent/transfers.hml). Pre-2.3.1 had
#           to buffer the entire response via get_binary; would pinch
#           on 40 GB+ models. Also fixes @stdlib/http.download() which
#           silently wrote 0 bytes in compiled binaries.
#   2.4.1 — file.read_binary() returns raw bytes intact (no truncation
#           at the first NUL). agent/services.hml uses it to parse
#           /proc/<pid>/cmdline (NUL-separated argv) without the old
#           `tr '\0' '\n'` shellout.
#   2.5.6 — first release with macOS arm64 binaries (hemlock-macos-arm64
#           .tar.gz), which is what makes the macos-arm64 matrix leg below
#           possible, plus accumulated runtime memory fixes.
#   2.5.7 — leak fixes that matter to the long-running agent/CP daemons:
#           task_free() now pthread_detach()es dropped async-task handles
#           (#583, compiled runtime) and accepted per-connection sockets
#           are refcounted/freed (#584, interpreter). These are the fixes
#           the 2.5.6 note had flagged as still-unreleased.
#   2.6.0 — two fixes we care about:
#           1. hemlockc now static-links libwebsockets/libssl/libffi by
#              default on Linux, so the compiled witchgrid binary no longer
#              depends on the host's libwebsockets soname at runtime. This
#              is what fixed the 24.04 (lws 4.3) agent SIGSEGV — the pin
#              below now stands only on the glibc-floor reason, not the lws
#              one.
#           2. VAL_SOCKET was missing from the interpreter's refcount
#              fast-path, so sockets stored in arrays/objects (the CP/agent
#              pass TcpListener sockets around) were over-released — a flaky
#              heap use-after-free. Fixed in the runtime.
#   2.6.2 — async-runtime signal delivery fix (#587): spawned worker threads
#           now mask signals so SIGTERM/INT/HUP reach the main thread, and
#           0-/1-arg handlers both run. Activates the CP's graceful
#           WAL-checkpoint-on-shutdown (dormant on 2.6.0/2.6.1). (2.6.1 was
#           released before the fix landed; skip straight to 2.6.2.)
#   2.7.0 — language/networking parity batch; load-bearing for us:
#           1. HTTP client hardening: requests with CR/LF in custom headers
#              are rejected (header-injection / request-splitting), and URL
#              ports are validated to 1-65535. Tightens the inference proxy's
#              forwarding path.
#           2. HTTPS context leak + timeout-misreport fix in
#              http_request/*_timeout (every HTTPS call leaked an lws context;
#              a request completing on the final poll was misreported as a
#              timeout). We still curl out for HF/fan-out (robust + bounds the
#              TCP connect), but this de-risks any in-process HTTPS we add back.
#           3. Socket I/O now retries EINTR instead of throwing a spurious
#              "Interrupted system call" — matters because CP+agent install
#              @stdlib/signal handlers and a signal mid-accept/recv used to
#              surface as an error.
#           4. Interpreter UAF passing sockets to spawn() + websocket/type-
#              registry refcount/race fixes — stabilizes `hemlock tests/run.hml`
#              (the suite runs interpreted; prod binaries are compiled).
#           BEHAVIORAL: string.find() now returns a CODEPOINT index (was a
#           byte index); our path/URL parsing is ASCII so unaffected, and the
#           unit+integration suites pass clean on 2.7.0.
env:
  HEMLOCK_VERSION: 2.7.0

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin to 22.04 (glibc 2.35), NOT ubuntu-latest, for the glibc
          # floor: building the released linux binary on 2.35 keeps its glibc
          # requirement low enough to run on the production boxes (schneewolf).
          # (Pre-2.6.0 there was a second reason — the dynamically-linked
          # Hemlock release SIGSEGV'd against 24.04's libwebsockets 4.3 — but
          # 2.6.0 static-links lws, so that no longer constrains the runner.)
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: macos-14            # Apple Silicon (arm64) runner
            target: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Hemlock build/runtime deps (Linux)
        if: runner.os == 'Linux'
        # Two distinct roles, post Hemlock 2.6.0:
        #  - libffi/libssl/libwebsockets/libz: as of 2.6.0 hemlockc STATIC-links
        #    these into the compiled binary. The -dev packages are now needed at
        #    BUILD time (they supply the static archives hemlockc links against),
        #    NOT at runtime — they no longer appear in `ldd` of the output.
        #  - libsqlite3: this is the one true RUNTIME dependency. @stdlib/sqlite
        #    dlopen()s libsqlite3.so.0 at startup (compile-time FFI), so it is
        #    invisible to `ldd` and is NOT bundled. Every box that runs the CP or
        #    agent needs it present. Installed explicitly here so the integration
        #    test step doesn't silently rely on the runner image shipping it.
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev libssl-dev libwebsockets-dev zlib1g-dev libsqlite3-0

      - name: Install Hemlock build deps (macOS)
        if: runner.os == 'macOS'
        # Same static-link inputs from Homebrew (macOS links these dynamically by
        # default, so they're also runtime deps there). libsqlite3 ships with the
        # macOS system, so no brew install for it.
        run: brew install libffi openssl@3 libwebsockets

      - name: Install Hemlock ${{ env.HEMLOCK_VERSION }}
        # install.sh detects os/arch (Darwin→macos, arm64) and pulls the
        # matching hemlock-${os}-${arch}.tar.gz release asset. Install to
        # /usr/local rather than ~/.local — install.sh puts stdlib at
        # ${PREFIX}/lib/hemlock/stdlib, and hemlockc only searches
        # <exe-dir>/{stdlib,../stdlib}, cwd, and the hardcoded
        # /usr/local/lib/hemlock/stdlib. /usr/local is the path that works
        # without symlinks on both platforms.
        run: |
          curl -fsSL https://raw.githubusercontent.com/hemlang/hemlock/main/install.sh \
            | sudo bash -s -- --version "v${HEMLOCK_VERSION}" \
                              --prefix "/usr/local" \
                              --no-modify-path

      - name: Verify Hemlock version
        run: |
          hemlock --version
          hemlockc --version
          # Sanity-check the install (catch a gross fallback, e.g. install.sh
          # dropping to a different major.minor). NOTE: Hemlock's version.h
          # isn't bumped per patch tag — the 2.6.1/2.6.2 release binaries still
          # self-report "2.6.0" — so we can't grep the exact patch. install.sh
          # pulls assets BY TAG (v${HEMLOCK_VERSION}), so the right (fixed)
          # build is installed regardless of the stale self-report; we just
          # verify the major.minor line matches.
          MM="$(echo "${HEMLOCK_VERSION}" | cut -d. -f1,2)"
          hemlockc --version | grep -q "${MM}\." \
            || { echo "Wrong Hemlock major.minor installed (wanted ${MM}.x)"; exit 1; }

      - name: Build cp
        run: |
          cd cp
          hemlockc cp.hml -o witchgrid-cp
          file witchgrid-cp
          ls -la witchgrid-cp

      - name: Build agent
        run: |
          cd agent
          hemlockc agent.hml -o witchgrid-agent
          file witchgrid-agent
          ls -la witchgrid-agent

      - name: Build inspect
        run: |
          cd cp
          hemlockc inspect.hml -o witchgrid-inspect
          file witchgrid-inspect
          ls -la witchgrid-inspect

      - name: Unit tests
        # Pure-function coverage for intent translator + capabilities
        # parser. Same `hemlock tests/run.hml` an operator runs locally.
        run: hemlock tests/run.hml

      - name: Smoke test — CP starts and answers /healthz
        # On macOS the freshly built binary dlopens the Homebrew dylibs;
        # point the dynamic loader at /opt/homebrew/lib (no-op on Linux,
        # where the var is simply unused).
        run: |
          export DYLD_FALLBACK_LIBRARY_PATH="/opt/homebrew/lib:/usr/local/lib:${DYLD_FALLBACK_LIBRARY_PATH:-}"
          ./cp/witchgrid-cp > /tmp/cp.log 2>&1 &
          CP_PID=$!
          for i in 1 2 3 4 5; do
            if curl -fsS http://localhost:8765/healthz 2>/dev/null; then
              echo
              echo "CP healthy"
              kill $CP_PID
              exit 0
            fi
            sleep 1
          done
          echo "CP didn't answer /healthz; log was:"
          cat /tmp/cp.log
          kill $CP_PID 2>/dev/null
          exit 1

      - name: Integration tests (CP + agent + fake backend)
        # Boots a real CP + agent and drives registration → spawn →
        # /resolve → health-gate → /v1/llama proxy → SSE, with a fake
        # llama-server (no GPU/model needed). Linux only: bash + the linux
        # binary + python3 (preinstalled on ubuntu runners). This is the
        # coverage the pure-unit tests can't reach.
        if: runner.os == 'Linux'
        run: bash tests/integration/run_integration.sh

      # ── per-platform release artifacts ────────────────────────────
      # On tag pushes, stage the three binaries with a platform suffix and
      # upload them as workflow artifacts. The separate `release` job below
      # collects every platform's artifacts into one GitHub release so the
      # SHA256SUMS covers all of them and the legs don't race to create the
      # release.
      - name: Stage platform artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          cp cp/witchgrid-cp        "dist/witchgrid-cp-${{ matrix.target }}"
          cp agent/witchgrid-agent  "dist/witchgrid-agent-${{ matrix.target }}"
          cp cp/witchgrid-inspect   "dist/witchgrid-inspect-${{ matrix.target }}"
          ls -la dist

      - name: Upload platform artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: witchgrid-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect + checksum
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Create / update GitHub release
        # action-gh-release@v2 reads the tag from the ref, finds (or
        # creates) the matching release, attaches files. generate_release_notes
        # builds notes from commits since the previous tag.
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
